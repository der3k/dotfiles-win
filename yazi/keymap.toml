[mgr]
prepend_keymap = [
  { on = "<C-q>", run = "quit", desc = "Quit the process" },
  { on = "q", run = "close", desc = "Close the current tab, or quit if it's last" },

  { on = ["g", "h"], run = "cd ~", desc = "Cd to ~" },
  { on = ["g", "c"], run = "cd ~/.config", desc = "Cd to ~/.config" },
  { on = ["g", "i"], run = "cd ~/in", desc = "Cd to ~/in" },
  { on = ["g", "a"], run = "cd ~/sis-app", desc = "Cd to ~/sis-app" },
]
